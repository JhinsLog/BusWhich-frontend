<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusWhich - Naver Map</title>
    <!-- 외부 CSS 파일 연결 -->
    <link rel="stylesheet" href="/css/styles.css" />
    <!-- jQuery 라이브러리 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- 네이버 지도 API 스크립트 -->
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=04vypofuz1"></script>
    <!-- <style> 태그 내용은 styles.css로 이동하는 것을 권장합니다. -->
    <!-- 만약 이 HTML 파일 내에 스타일을 유지해야 한다면, 아래와 같이 유지할 수 있습니다. -->
    <style>

    </style>
</head>
<body>
<!-- 네이버 지도가 표시될 컨테이너 -->
<div id="map"></div>

<!-- 버스 정보 카드 -->
<div id="bus-info" class="info-card"> <!-- 'info-card' 클래스는 styles.css에 정의되어 있으나, 여기서는 id 선택자로 스타일링 중 -->
    <!-- 카드를 열고 닫기 위한 핸들 (드래그 기능은 현재 미구현) -->
    <div class="drag-handle" title="정보 카드 열기/닫기"></div>
    <!-- 첫 번째 버스 정보 행 -->
    <div class="bus-row">
        <div class="bus-number green">17</div>
        <img src="./assets/images/bus_green.png" class="bus-icon" alt="초록색 버스 아이콘" />
        <div class="crowd">여유</div> <!-- "Not crowded" -> "여유" 등 한국어 표기 고려 -->
        <div class="time">1분 5초</div>
    </div>
    <!-- 두 번째 버스 정보 행 -->
    <div class="bus-row">
        <div class="bus-number yellow">258</div>
        <img src="./assets/images/bus_yellow.png" class="bus-icon" alt="노란색 버스 아이콘" />
        <div class="crowd">보통</div> <!-- "Some crowding" -> "보통" 등 -->
        <div class="time">3분 20초</div>
    </div>
    <!-- 세 번째 버스 정보 행 -->
    <div class="bus-row">
        <div class="bus-number red">67</div>
        <img src="./assets/images/bus_red.png" class="bus-icon" alt="빨간색 버스 아이콘" />
        <div class="crowd">혼잡</div> <!-- "Crowded" -> "혼잡" 등 -->
        <div class="time">8분 45초</div>
    </div>
</div>

<!-- 하단 네비게이션 메뉴 -->
<nav class="bottom-nav">
    <button class="nav-item active" aria-current="page">홈</button> <!-- 현재 페이지임을 명시 -->
    <button class="nav-item">검색</button>
    <button class="nav-item">즐겨찾기</button>
</nav>

<script>
    // 문서가 완전히 로드된 후 스크립트 실행
    $(document).ready(function () {
        // 버스 정보 카드 클릭 이벤트 핸들러
        // '.drag-handle' 또는 카드 전체 클릭 시 'collapsed' 클래스를 토글하여 카드를 열고 닫음
        $('#bus-info .drag-handle').on('click', function (event) {
            event.stopPropagation(); // 이벤트 버블링 방지 (카드 전체 클릭과 중복 방지)
            $('#bus-info').toggleClass('collapsed');
        });

        // 카드 영역 클릭 시 (핸들 제외) 토글되지 않도록 하거나, 다른 동작을 원하면 수정
        // 현재는 카드 전체 클릭 시 토글되도록 되어 있음. 만약 핸들만으로 토글하고 싶다면 아래 코드는 주석 처리
        // $('#bus-info').on('click', function () {
        // $(this).toggleClass('collapsed');
        // });


        // 네이버 지도 초기화
        var mapOptions = {
            center: new naver.maps.LatLng(37.5665, 126.9780), // 초기 중심 좌표 (서울 시청)
            zoom: 15, // 초기 줌 레벨
            // 추가적인 지도 옵션들 (예: 줌 컨트롤, 스케일 컨트롤 등)
            // zoomControl: true,
            // zoomControlOptions: {
            //     position: naver.maps.Position.TOP_RIGHT
            // }
        };
        var map = new naver.maps.Map('map', mapOptions); // 'map'은 지도를 표시할 div의 ID

        // 사용자 현재 위치 가져오기 (Geolocation API)
        if (navigator.geolocation) { // 브라우저가 Geolocation API를 지원하는지 확인
            navigator.geolocation.getCurrentPosition(function (position) {
                // 위치 정보 가져오기 성공
                var lat = position.coords.latitude; // 위도
                var lng = position.coords.longitude; // 경도
                var userLocation = new naver.maps.LatLng(lat, lng);

                // 사용자 위치에 마커 표시 (주석에서는 원형이었으나, 실제로는 마커가 더 일반적)
                var userMarker = new naver.maps.Marker({
                    position: userLocation,
                    map: map,
                    // 아이콘 커스터마이징 가능
                    // icon: {
                    //     url: '/images/user_marker.png', // 사용자 정의 마커 이미지 경로
                    //     size: new naver.maps.Size(22, 35),
                    //     origin: new naver.maps.Point(0, 0),
                    //     anchor: new naver.maps.Point(11, 35)
                    // }
                });

                // (선택) 사용자 위치에 원형 오버레이 표시 (정확도 표시 등에 활용 가능)
                var locationAccuracyCircle = new naver.maps.Circle({
                    map: map,
                    center: userLocation,
                    radius: position.coords.accuracy || 20, // 위치 정확도에 따라 반경 설정, 없으면 기본값
                    fillColor: '#007bff',
                    fillOpacity: 0.2,
                    strokeColor: '#007bff',
                    strokeOpacity: 0.5,
                    strokeWeight: 1
                });


                // 지도의 중심을 사용자 위치로 이동
                map.setCenter(userLocation);
                // 사용자 위치를 찾았을 때 줌 레벨을 좀 더 가깝게 조정
                map.setZoom(16);

            }, function (error) {
                // 위치 정보 가져오기 실패 (예: 사용자가 권한 거부)
                console.error("Geolocation 오류:", error.message);
                // 사용자에게 좀 더 친절한 메시지 표시 가능
                // alert("위치 정보를 가져오는 데 실패했습니다. 브라우저의 위치 접근 권한을 확인해주세요.");
                // 기본 위치(예: 서울 시청)로 지도를 유지하거나, 다른 대체 로직 수행
            });
        } else {
            // 브라우저가 Geolocation API를 지원하지 않음
            alert("현재 사용 중인 브라우저에서는 위치 기능을 지원하지 않습니다.");
        }

        // 하단 네비게이션 아이템 클릭 이벤트 (예시)
        $('.nav-item').on('click', function() {
            $('.nav-item').removeClass('active').removeAttr('aria-current'); // 모든 아이템에서 active 클래스 및 aria-current 제거
            $(this).addClass('active').attr('aria-current', 'page'); // 클릭된 아이템에 active 클래스 및 aria-current 추가

            var itemName = $(this).text();
            // TODO: 각 네비게이션 아이템에 따른 실제 동작 구현
            // 예: if (itemName === '검색') { // 검색 화면으로 이동 또는 검색 UI 표시 }
            console.log(itemName + " 메뉴 클릭됨");
        });
    });
</script>
</body>
</html>
